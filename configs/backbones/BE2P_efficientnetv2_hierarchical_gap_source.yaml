data:
  image_size: 224
model:
  backbone: tf_efficientnetv2_b0.in1k
  pretrained: true
  head: hierarchical_gap
  out_indices: [1, 3, 4]
  projection_dim: 512
  classifier: linear
adaptation:
  method: source_only
training:
  classification_loss: cross_entropy
  output_dir: outputs/BE2P_efficientnetv2_hierarchical_gap_source
