model:
  backbone: mobilenetv3_large_100
  head: hbp_residual_control
  out_indices: [1, 3, 4]
  projection_dim: 512
  # 1536 x 80 equals the residual projection weights in M1r.
  residual_control_dim: 80
adaptation:
  method: source_only
training:
  output_dir: outputs/M1rc_mobilenetv3_hbp_residual_control_source
