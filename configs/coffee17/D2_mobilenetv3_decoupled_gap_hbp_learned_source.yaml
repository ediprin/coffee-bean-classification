model:
  backbone: mobilenetv3_large_100
  head: decoupled_gap_hbp_learned
  out_indices: [1, 3, 4]
  projection_dim: 512
  dual_gate_hidden: 32
  dual_fusion_detach: true
adaptation:
  method: source_only
training:
  expert_aux_weight: 0.5
  expert_diversity_weight: 0.0
  output_dir: outputs/D2_mobilenetv3_decoupled_gap_hbp_learned_source
