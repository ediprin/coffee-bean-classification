model:
  backbone: mobilenetv3_large_100
  head: hbp
  num_classes: 9
  out_indices: [1, 3, 4]
  projection_dim: 512
adaptation:
  method: source_only
training:
  output_dir: outputs/GC1_mobilenetv3_hbp_coarse9_source
evaluation:
  hard_groups:
    all_coarse: [Black, Covering Residue, Developmental, Fade, Fungus Damage, Insect Damage, Physical Form, Processing Density, Sour]
