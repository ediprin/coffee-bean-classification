data:
  image_size: 224
  batch_size: 32
model:
  backbone: mobilenetv3_large_100
  pretrained: true
  head: capacity_residual_hbp
  num_classes: 8
  out_indices: [1, 3, 4]
  projection_dim: 512
  capacity_hidden_dim: 1137
  classifier: linear
adaptation:
  method: source_only
training:
  epochs: 25
  output_dir: outputs/CBDC1_mobilenetv3_capacity_residual_hbp_source
evaluation:
  hard_groups:
    all_defects: [Black, Broken, Dried Cherry, Floater, Fungus Damage, Insect Damage, Sour]
