model:
  backbone: mobilenetv3_large_100
  head: gap_hbp_residual
  out_indices: [1, 3, 4]
  projection_dim: 512
  # The original 1536-D HBP is retained; GAP only adds a 128-D residual.
  residual_gap_dim: 128
adaptation:
  method: source_only
training:
  output_dir: outputs/M1r_mobilenetv3_gap_hbp_residual_source
