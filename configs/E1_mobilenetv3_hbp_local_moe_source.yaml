model:
  backbone: mobilenetv3_large_100
  head: hbp_moe
  out_indices: [1, 3, 4]
  projection_dim: 512
  moe_local_dim: 256
  moe_gate_hidden: 32
  moe_hbp_prior: 0.8
adaptation:
  method: source_only
training:
  expert_aux_weight: 0.3
  expert_diversity_weight: 0.05
  output_dir: outputs/E1_mobilenetv3_hbp_local_moe_source
