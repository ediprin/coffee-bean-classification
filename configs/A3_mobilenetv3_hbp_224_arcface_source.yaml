data:
  image_size: 224
model:
  backbone: mobilenetv3_large_100
  head: hbp
  out_indices: [1, 3, 4]
  projection_dim: 512
  classifier: arcface
  arcface_scale: 30.0
  arcface_margin: 0.3
adaptation:
  method: source_only
training:
  label_smoothing: 0.0
  output_dir: outputs/A3_mobilenetv3_hbp_224_arcface_source

