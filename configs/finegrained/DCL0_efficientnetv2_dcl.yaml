data:
  image_size: 224
model:
  backbone: tf_efficientnetv2_b0.in1k
  pretrained: true
  head: dcl_gap
  out_indices: [4]
  classifier: linear
  dcl_grid_size: 7
adaptation:
  method: source_only
training:
  classification_loss: cross_entropy
  dcl_swap_weight: 1.0
  dcl_layout_weight: 1.0
  dcl_contrastive_mode: none
  contrastive_weight: 0.0
  confusion_strength: 0.0
  output_dir: outputs/DCL0_efficientnetv2_dcl
