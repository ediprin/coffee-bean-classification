data:
  image_size: 224
  batch_size: 32
model:
  backbone: mobilenetv3_large_100
  pretrained: true
  head: hbp
  num_classes: 8
  out_indices: [1, 3, 4]
  projection_dim: 512
  classifier: linear
adaptation:
  method: source_only
training:
  epochs: 25
  classification_loss: balanced_softmax
  output_dir: outputs/CBD3_mobilenetv3_hbp_balanced_softmax
evaluation:
  hard_groups:
    all_defects: [Black, Broken, Dried Cherry, Floater, Fungus Damage, Insect Damage, Sour]
