data:
  image_size: 224
  batch_size: 32
model:
  backbone: mobilenetv3_large_100
  pretrained: true
  head: decoupled_gap_hbp_fixed
  num_classes: 8
  out_indices: [1, 3, 4]
  projection_dim: 512
  dual_fusion_detach: true
adaptation:
  method: source_only
training:
  epochs: 25
  expert_aux_weight: 0.5
  expert_diversity_weight: 0.0
  output_dir: outputs/CBDD1_mobilenetv3_decoupled_gap_hbp_fixed_source
evaluation:
  hard_groups:
    all_defects: [Black, Broken, Dried Cherry, Floater, Fungus Damage, Insect Damage, Sour]
